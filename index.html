
<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>oSein</title>
<style>
  :root {
    --bg: #111113;
    --bg2: #161618;
    --card: #1a1a1c;
    --card2: #202022;
    --border: #2a2a2c;
    --text: #e0e0e0;
    --muted: #888;
    --glow: rgba(170,170,170,0.12);
    --glow2: rgba(170,170,170,0.06);
    --btn-from: #1a1a1c;
    --btn-to: #262628;
    --shadow: rgba(0,0,0,0.4);
    --nav-pill-active: #242426;
  }
  [data-theme="light"] {
    --bg: #f0f0f2;
    --bg2: #e8e8ea;
    --card: #ffffff;
    --card2: #f5f5f7;
    --border: #d8d8da;
    --text: #1a1a1c;
    --muted: #666;
    --glow: rgba(100,100,100,0.1);
    --glow2: rgba(100,100,100,0.05);
    --btn-from: #e5e5e7;
    --btn-to: #ffffff;
    --shadow: rgba(0,0,0,0.12);
    --nav-pill-active: #e0e0e2;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    cursor: none;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }

  /* ── CURSOR (anel + ponto) ───────────────── */
  #cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1.5px solid rgba(170,170,170,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    top: 0; left: 0;
    transform: translate(-50%,-50%);
    transition: width 0.25s cubic-bezier(.4,0,.2,1),
                height 0.25s cubic-bezier(.4,0,.2,1),
                border-color 0.25s,
                box-shadow 0.25s;
    will-change: transform;
  }
  #cursor-dot {
    position: fixed;
    width: 5px; height: 5px;
    background: #cccccc;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    top: 0; left: 0;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 6px 1px rgba(200,200,200,0.6);
    will-change: transform;
    transition: width 0.15s, height 0.15s, opacity 0.15s;
  }
  #cursor-ring.hovered {
    width: 46px; height: 46px;
    border-color: rgba(170,170,170,0.8);
    box-shadow: 0 0 14px 2px rgba(170,170,170,0.18);
  }
  #cursor-dot.hovered {
    width: 3px; height: 3px;
    opacity: 0.6;
  }

  /* ── BACKGROUND ─────────────────────────── */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-glow::before {
    content:'';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(130,130,140,0.07) 0%, transparent 70%);
    top: -100px; left: 50%;
    transform: translateX(-50%);
    animation: bgPulse 8s ease-in-out infinite;
  }
  .bg-glow::after {
    content:'';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(100,100,110,0.05) 0%, transparent 70%);
    bottom: 5%; right: 10%;
    animation: bgPulse 12s ease-in-out infinite reverse;
  }
  @keyframes bgPulse {
    0%,100%{ opacity:0.6; transform:translateX(-50%) scale(1); }
    50%    { opacity:1;   transform:translateX(-50%) scale(1.15); }
  }

  /* ── LAYOUT ─────────────────────────────── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── NAVBAR ─────────────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 14px 0;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(17,17,19,0.75);
    border-bottom: 1px solid var(--border);
    transition: background 0.4s;
  }
  [data-theme="light"] nav { background: rgba(240,240,242,0.85); }
  .nav-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
  }
  .nav-logo {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
    opacity: 0.9;
  }

  /* ── NAV TABS (centro) ───────────────────── */
  .nav-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }
  .nav-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: none;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.2s;
    user-select: none;
    white-space: nowrap;
  }
  .nav-tab:hover {
    background: var(--nav-pill-active);
    color: var(--text);
    transform: translateY(-1px);
  }
  .nav-tab.active-tab {
    background: var(--nav-pill-active);
    color: var(--text);
    box-shadow: 0 1px 6px var(--shadow);
  }
  .nav-tab svg { flex-shrink:0; }

  .nav-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: flex-end;
  }
  .nav-btn {
    display: flex; align-items:center; gap:6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: none;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.22s, background 0.3s;
    user-select: none;
  }
  .nav-btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 4px 16px var(--shadow), 0 0 12px var(--glow);
  }

  /* ── HERO ───────────────────────────────── */
  .hero {
    padding-top: 120px;
    padding-bottom: 80px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* ── AVATAR ─────────────────────────────── */
  .avatar-wrap {
    position: relative;
    width: 130px; height: 130px;
    margin: 0 auto;
  }
  .avatar-img {
    width: 130px; height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    box-shadow: 0 0 0 3px var(--bg2), 0 0 24px 6px rgba(170,170,170,0.15);
    position: relative; z-index: 2;
    display: block;
  }
  .avatar-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(170,170,170,0.18);
    animation: ringRotate 14s linear infinite;
    pointer-events: none;
  }
  .avatar-ring::before {
    content:'';
    position: absolute;
    width: 8px; height: 8px;
    background: rgba(170,170,170,0.5);
    border-radius: 50%;
    top: 50%; left: -4px;
    transform: translateY(-50%);
    box-shadow: 0 0 6px 2px rgba(170,170,170,0.3);
    animation: dotPulse 3s ease-in-out infinite;
  }
  .orbit-canvas {
    position: absolute;
    inset: -18px;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes dotPulse {
    0%,100%{ box-shadow: 0 0 6px 2px rgba(170,170,170,0.3); opacity:0.8; }
    50%    { box-shadow: 0 0 10px 4px rgba(170,170,170,0.5); opacity:1; }
  }

  /* ── HERO TEXT ──────────────────────────── */
  .hero-name {
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .hero-role {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .hero-role-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(170,170,170,0.4);
    display: inline-block;
  }
  .hero-tags {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .tag {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    background: var(--card);
    letter-spacing: 0.02em;
    transition: transform 0.22s, box-shadow 0.22s;
  }
  .tag:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 4px 14px var(--shadow), 0 0 10px var(--glow);
  }

  /* ── CONNECT BUTTON (hero) ──────────────── */
  .hero-connect-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 28px;
    border-radius: 10px;
    border: 1px solid rgba(170,170,170,0.25);
    background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: none;
    box-shadow: 0 3px 14px var(--shadow), 0 0 0 0 rgba(170,170,170,0);
    transition: transform 0.22s cubic-bezier(.4,0,.2,1),
                box-shadow 0.22s,
                border-color 0.22s;
    user-select: none;
    margin-top: 6px;
  }
  .hero-connect-btn:hover {
    transform: translateY(-3px) scale(1.03);
    border-color: rgba(170,170,170,0.45);
    box-shadow: 0 8px 24px var(--shadow), 0 0 18px rgba(170,170,170,0.14);
  }

  /* ── CONTRIBUTION BADGE ─────────────────── */
  .contrib-badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 14px 30px;
    border-radius: 50px;
    border: 1px solid rgba(170,170,170,0.2);
    background: var(--card);
    box-shadow: 0 4px 24px var(--shadow), 0 0 20px rgba(170,170,170,0.06);
    margin: 0 auto;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .contrib-badge:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 32px var(--shadow), 0 0 24px rgba(170,170,170,0.12);
  }
  .contrib-number {
    font-size: clamp(20px, 4vw, 26px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }
  .contrib-number span { color: #aaa; text-shadow: 0 0 12px rgba(170,170,170,0.4); }
  .contrib-divider { width: 1px; height: 28px; background: var(--border); opacity: 0.7; }
  .contrib-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    line-height: 1.4;
  }
  .contrib-label strong {
    display: block;
    font-size: 14px;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--text);
    font-weight: 600;
    opacity: 0.9;
  }

  /* ── SECTIONS ───────────────────────────── */
  section {
    padding: 64px 0;
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  section.visible { opacity: 1; transform: translateY(0); }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 28px;
    font-weight: 600;
    text-align: center;
  }

  /* ── ABOUT ──────────────────────────────── */
  .about-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    max-width: 520px;
    margin: 0 auto;
    box-shadow: 0 4px 24px var(--shadow);
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .about-box:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 8px 32px var(--shadow), 0 0 20px var(--glow);
  }
  .about-box p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    opacity: 0.85;
  }

  /* ── SKILLS ─────────────────────────────── */
  .skills-grid { display: grid; gap: 14px; }
  .skill-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: default;
  }
  .skill-item:hover {
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 6px 20px var(--shadow), 0 0 14px var(--glow);
  }
  .skill-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    opacity: 0.9;
  }
  .skill-bar-bg {
    height: 5px;
    background: var(--bg2);
    border-radius: 4px;
    overflow: hidden;
  }
  .skill-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #888 0%, #aaa 100%);
    width: 0%;
    transition: width 0.9s cubic-bezier(.4,0,.2,1), box-shadow 0.3s;
  }
  .skill-item:hover .skill-bar { box-shadow: 0 0 8px 2px rgba(170,170,170,0.4); }
  .skill-item.animated .skill-bar { width: var(--pct); }

  /* ── SERVERS ─────────────────────────────── */
  .servers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 16px;
  }
  .server-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 18px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
  }
  .server-card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 8px 28px var(--shadow), 0 0 18px var(--glow);
  }
  .server-img {
    width: 64px; height: 64px;
    border-radius: 14px;
    object-fit: cover;
    border: 1px solid var(--border);
    box-shadow: 0 2px 10px var(--shadow);
  }
  .server-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  /* Todos os badges de role iguais */
  .server-role {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg2);
  }
  .server-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    opacity: 0.9;
  }
  .server-btn {
    margin-top: 4px;
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    cursor: none;
    display: inline-flex; align-items:center; gap:5px;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.22s;
  }
  .server-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 4px 14px var(--shadow), 0 0 10px var(--glow);
  }

  /* ── CONTACT ─────────────────────────────── */
  .contact-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 42px 36px;
    max-width: 460px;
    margin: 0 auto;
    text-align: center;
    box-shadow: 0 4px 24px var(--shadow);
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .contact-box:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 8px 32px var(--shadow), 0 0 22px var(--glow);
  }
  .contact-box h3 {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
  }
  .contact-box p { font-size: 14px; color: var(--muted); }
  .contact-btn {
    padding: 11px 28px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    cursor: none;
    display: inline-flex; align-items:center; gap:8px;
    box-shadow: 0 3px 12px var(--shadow);
    transition: transform 0.22s cubic-bezier(.4,0,.2,1), box-shadow 0.22s;
  }
  .contact-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 6px 20px var(--shadow), 0 0 16px var(--glow);
  }

  /* ── FOOTER ─────────────────────────────── */
  footer {
    padding: 32px 0 40px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* ── SCROLLBAR ──────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── RESPONSIVE ─────────────────────────── */
  @media(max-width:700px){
    .nav-inner { grid-template-columns: 1fr auto; }
    .nav-logo { display: none; }
    .nav-tabs { gap: 1px; }
    .nav-tab span.tab-label { display: none; }
    .nav-tab { padding: 6px 10px; }
  }
  @media(max-width:600px){
    .servers-grid { grid-template-columns: repeat(2, 1fr); gap:12px; }
    .server-card { padding:16px 12px 14px; }
    .about-box, .contact-box { padding:28px 22px; }
    .contrib-badge { padding:12px 20px; flex-wrap:wrap; justify-content:center; text-align:center; }
    .contrib-label { text-align:center; }
    .contrib-divider { display:none; }
  }
</style>
</head>
<body>

<!-- Cursors -->
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<!-- BG glow -->
<div class="bg-glow"></div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <span class="nav-logo">oSein</span>

    <!-- TABS CENTRAIS -->
    <div class="nav-tabs">
      <button class="nav-tab active-tab" onclick="smoothScrollTo('sec-about'); setTab(this)" data-pt="Sobre" data-en="About">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span class="tab-label" data-pt="Sobre" data-en="About">Sobre</span>
      </button>
      <button class="nav-tab" onclick="smoothScrollTo('sec-servers'); setTab(this)" data-pt="Servidores" data-en="Servers">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        <span class="tab-label" data-pt="Servidores" data-en="Servers">Servidores</span>
      </button>
      <button class="nav-tab" onclick="smoothScrollTo('sec-contact'); setTab(this)" data-pt="Conectar" data-en="Connect">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="tab-label" data-pt="Conectar" data-en="Connect">Conectar</span>
      </button>
    </div>

    <div class="nav-actions">
      <button class="nav-btn" onclick="toggleLang()" title="Idioma">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
        <span id="langLabel">EN</span>
      </button>
      <button class="nav-btn" onclick="toggleTheme()" title="Tema">
        <span id="themeIcon">☀</span>
      </button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="wrapper">

  <!-- HERO -->
  <div class="hero">
    <div class="avatar-wrap">
