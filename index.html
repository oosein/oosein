<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>oSein — Discord Moderator & Community Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    
    /* ── CURSOR ── */
    *{cursor:none!important;}
    #cursor-dot{position:fixed;width:10px;height:10px;background:#aaaaaa;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0-10px #aaaaaa88;transition:width .2s,height .2s,box-shadow .2s;}
    #cursor-ring{position:fixed;width:32px;height:32px;border:1.5px solid #aaaaaa88;border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s,box-shadow .2s;}
    body.hovering #cursor-dot{width:14px;height:14px;box-shadow:0 0 20px #aaaaaacc;}
    body.hovering #cursor-ring{width:44px;height:44px;border-color:#aaaaaa;box-shadow:0 0 16px #aaaaaa44;}

    /* ── THEME VARS ── */
    [data-theme="dark"]{
      --bg:#0f0f0f;--bg2:#1a1a1a;--card:#222222;--border:#2a2a2a;
      --text:#e5e5e5;--muted:#a3a3a3;
      --btn-from:#1a1a1a;--btn-to:#2a2a2a;--btn-text:#e5e5e5;--btn-border:#2a2a2a;
      --glow:rgba(170,170,170,.12);--glow2:rgba(170,170,170,.22);
      --nav-bg:rgba(15,15,15,.85);
      --discord-icon:brightness(1) grayscale(1) invert(0.85);
    }
    [data-theme="light"]{
      --bg:#f5f5f5;--bg2:#e5e5e5;--card:#ffffff;--border:#d4d4d4;
      --text:#1a1a1a;--muted:#555555;
      --btn-from:#e5e5e5;--btn-to:#ffffff;--btn-text:#1a1a1a;--btn-border:#d4d4d4;
      --glow:rgba(0,0,0,.06);--glow2:rgba(0,0,0,.12);
      --nav-bg:rgba(245,245,245,.85);
      --discord-icon:brightness(0) saturate(100%) invert(0.12);
    }

    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);transition:background .4s,color .4s;overflow-x:hidden;}

    /* ── BG GLOW ── */
    .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .bg-glow span{position:absolute;border-radius:50%;filter:blur(120px);animation:bgFloat 18s ease-in-out infinite;}
    .bg-glow span:nth-child(1){width:600px;height:600px;background:rgba(160,160,160,.04);top:-200px;left:-100px;}
    .bg-glow span:nth-child(2){width:500px;height:500px;background:rgba(130,130,130,.03);bottom:-150px;right:-80px;animation-delay:-9s;}
    @keyframes bgFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(40px) scale(1.05);}}

    /* ── NAVBAR ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--nav-bg);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);}
    .nav-inner{max-width:1100px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .nav-logo{font-size:1.3rem;font-weight:700;color:var(--text);letter-spacing:.5px;}
    .nav-links{display:flex;gap:2rem;list-style:none;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .25s;}
    .nav-links a:hover{color:var(--text);}
    .btn-icon{background:none;border:1px solid var(--border);color:var(--muted);padding:.45rem .65rem;border-radius:8px;cursor:pointer;}

    /* ── HERO & AVATAR ORBIT ── */
    #inicio{min-height:100vh;display:flex;align-items:center;justify-content:center;padding-top:64px;}
    .hero-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;gap:2rem;}
    
    .avatar-orbit-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      z-index: 5;
      border: 3px solid var(--border);
      object-fit: cover;
    }
    /* Orbit Details */
    .orbit-ring {
      position: absolute;
      border: 1px solid rgba(170, 170, 170, 0.15);
      border-radius: 50%;
      animation: orbitSpin linear infinite;
    }
    .ring-1 { width: 200px; height: 200px; animation-duration: 8s; }
    .ring-2 { width: 230px; height: 230px; animation-duration: 12s; border-style: dashed; opacity: 0.5; }
    .ring-3 { width: 260px; height: 260px; animation-duration: 20s; animation-direction: reverse; }
    
    .orbit-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #aaaaaa;
      border-radius: 50%;
      top: 0;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #aaaaaa;
    }
    @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .hero-name{font-size:3.2rem;font-weight:700;color:var(--text);}
    .hero-role{color:var(--muted);font-size:1.1rem;}

    /* ── COMMUNITIES GRID (AS PER IMAGE) ── */
    #comunidades{padding:7rem 0;}
    .communities-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;max-width:950px;margin:0 auto;}
    .community-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:2rem;
      display:flex;
      flex-direction:column;
      gap:1.2rem;
      transition:transform .3s;
      text-align: left;
    }
    .community-card:hover{transform:translateY(-5px);}
    .comm-header{display:flex;align-items:center;gap:1rem;}
    .community-img{width:60px;height:60px;border-radius:14px;object-fit:cover;}
    .comm-info-top h3{font-size:1.2rem;font-weight:700;}
    
    .role-badge{
      display:inline-block;
      font-size:0.75rem;
      padding:4px 12px;
      border-radius:12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 4px;
    }

    .community-desc{font-size:0.95rem;color:var(--muted);line-height:1.6;min-height:3em;}
    
    .community-btn{
      background: #2a2a2a;
      color: white;
      text-decoration: none;
      padding: 0.7rem 1.2rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: fit-content;
      transition: background 0.3s;
    }
    .community-btn:hover{background: #333333;}
    .discord-svg{width:18px;height:18px;fill:currentColor;}

    /* ── SECTIONS GENERIC ── */
    .container{max-width:1100px;margin:0 auto;padding:0 2rem;}
    .section-title{font-size:2rem;text-align:center;margin-bottom:3rem;}
    .fade-in{opacity:0;transform:translateY(20px);transition:0.6s all ease-out;}
    .fade-in.visible{opacity:1;transform:translateY(0);}

    @media(max-width:768px){ .communities-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<div class="bg-glow"><span></span><span></span></div>

<nav>
  <div class="nav-inner">
    <span class="nav-logo">oSein</span>
    <ul class="nav-links">
      <li><a href="#inicio">Início</a></li>
      <li><a href="#comunidades">Comunidades</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-icon" id="theme-btn">☀️</button>
    </div>
  </div>
</nav>

<section id="inicio">
  <div class="container">
    <div class="hero-wrap fade-in">
      <div class="avatar-orbit-wrap">
        <div class="orbit-ring ring-1"><div class="orbit-particle"></div></div>
        <div class="orbit-ring ring-2"></div>
        <div class="orbit-ring ring-3"><div class="orbit-particle"></div></div>
        <img class="avatar-img" src="https://i.pinimg.com/736x/93/c6/6e/93c66e735b6c02afb07c3ba23480dfd7.jpg" alt="oSein"/>
      </div>
      <div>
        <div class="hero-name">oSein</div>
        <div class="hero-role">Discord Moderator & Community Manager</div>
      </div>
    </div>
  </div>
</section>

<section id="comunidades">
  <div class="container">
    <h2 class="section-title fade-in">Comunidades</h2>
    <div class="communities-grid">
      
      <div class="community-card fade-in">
        <div class="comm-header">
          <img class="community-img" src="https://osein.vercel.app/assets/Anime%20Crash.webp" alt="Anime Crash"/>
          <div class="comm-info-top">
            <h3>Anime Crash</h3>
            <span class="role-badge">Moderator (Retired)</span>
          </div>
        </div>
        <p class="community-desc">Atuei na moderação garantindo organização e cumprimento das regras.</p>
