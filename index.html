<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oSein | Gestão de Comunidades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 80px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #222;
            margin-bottom: 24px;
        }

        .name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .title {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 24px;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #5865F2;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .discord-btn svg {
            width: 20px;
            height: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 32px;
            text-align: center;
        }

        .communities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .community-card {
            background-color: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .community-card:hover {
            border-color: #444;
            transform: translateY(-4px);
            background-color: #151515;
        }

        .community-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #222;
        }

        .community-info {
            flex: 1;
        }

        .community-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .community-role {
            font-size: 0.9rem;
            color: #888;
        }

        .arrow {
            color: #555;
            transition: all 0.3s ease;
        }

        .community-card:hover .arrow {
            color: #fff;
            transform: translateX(4px);
        }

        .footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #222;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <img src="https://cdn.discordapp.com/avatars/123456789/avatar.png" alt="oSein" class="profile-image" onerror="this.style.background='#333'">
            <h1 class="name">oSein</h1>
            <p class="title">Gestão de Comunidades Discord</p>
            <a href="https://discord.com/users/osein" target="_blank" class="discord-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                Entrar em contato
            </a>
        </section>

        <section>
            <h2 class="section-title">Comunidades</h2>
            <div class="communities-grid">
                <a href="https://discord.gg/K5gSxMUsm" target="_blank" class="community-card">
                    <div class="community-logo"></div>
                    <div class="community-info">
                        <h3 class="community-name">Anime Crash</h3>
                        <p class="community-role">Moderador Executivo</p>
                    </div>
                    <span class="arrow">→</span>
                </a>

                <a href="https://discord.gg/xCN3kvCwzG" target="_blank" class="community-card">
                    <div class="community-logo"></div>
                    <div class="community-info">
                        <h3 class="community-name">Anime Brawl</h3>
                        <p class="community-role">Trial Mod Unit</p>
                    </div>
                    <span class="arrow">→</span>
                </a>

                <a href="https://discord.com/invite/CkVnGNm3Ct" target="_blank" class="community-card">
                    <div class="community-logo"></div>
                    <div class="community-info">
                        <h3 class="community-name">Anime All</h3>
                        <p class="community-role">Moderador Executivo</p>
                    </div>
                    <span class="arrow">→</span>
                </a>

                <a href="https://discord.gg/xYMbWT8hby" target="_blank" class="community-card">
                    <div class="community-logo"></div>
                    <div class="community-info">
                        <h3 class="community-name">Anime Fallen</h3>
                        <p class="community-role">Moderador Executivo</p>
                    </div>
                    <span class="arrow">→</span>
                </a>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 oSein. Todos os direitos reservados.</p>
        </footer>
    </div>
</body>
</html>
