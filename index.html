<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oSein | Gestão de Comunidades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 80px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #222;
            margin-bottom: 24px;
        }

        .name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .title {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 24px;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #5865F2;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .discord-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Communities Section */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 32px;
            text-align: center;
        }

        .communities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .community-card {
            background-color: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .community-card:hover {
            border-color: #444;
            transform: translateY(-4px);
            background-color: #151515;
        }

        .community-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .community-info {
            flex: 1;
        }

        .community-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .community-role {
            font-size: 0.9rem;
            color: #888;
        }

        .arrow {
            color: #555;
            transition: all 0.3s ease;
        }

        .community-card:hover .arrow {
            color: #fff;
            transform: translateX(4px);
        }

        .footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #222
