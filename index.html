<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>oSein — Discord Staff & Moderation</title>
<meta name="description" content="oSein — Discord staff and moderator. Building safer, friendlier anime communities." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --bg-2:#111; --card:#121212; --card-2:#161616;
    --border:#262626; --border-2:#2e2e2e;
    --text:#f4f4f4; --muted:#9a9a9a; --muted-2:#6e6e6e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;
  }
  a{color:inherit; text-decoration:none}
  img{display:block; max-width:100%}

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(10,10,10,.8); backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(38,38,38,.6);
  }
  nav{max-width:1024px; margin:0 auto; padding:12px 20px;
    display:flex; align-items:center; justify-content:space-between}
  .brand{font-weight:600; font-size:14px; background:none; border:0; color:var(--text); cursor:pointer;
    transition:transform .3s ease}
  .brand:hover{transform:translateY(-2px) scale(1.02)}
  .nav-actions{display:flex; align-items:center; gap:4px; font-size:14px}
  .nav-link{background:none; border:0; color:var(--muted); padding:6px 12px; border-radius:6px; cursor:pointer;
    transition:all .3s ease}
  .nav-link:hover{background:var(--card-2); color:var(--text); transform:translateY(-2px) scale(1.02)}
  .lang{display:flex; align-items:center; margin-left:8px; padding:2px;
    background:rgba(22,22,22,.6); border:1px solid var(--border); border-radius:6px; font-size:12px}
  .lang button{background:none; border:0; color:var(--muted); padding:4px 8px; border-radius:4px; cursor:pointer}
  .lang button.active{background:var(--text); color:var(--bg)}

  .hero{max-width:768px; margin:0 auto; padding:80px 20px 64px; text-align:center;
    display:flex; flex-direction:column; align-items:center}
  .avatar-ring{padding:4px; border-radius:9999px;
    box-shadow:0 0 0 2px #474747, 0 0 40px rgba(255,255,255,.08)}
  .avatar-ring img{width:112px; height:112px; border-radius:9999px; object-fit:cover}
  h1{margin-top:24px; font-size:44px; font-weight:600; letter-spacing:-.02em}
  .hero-sub{margin-top:8px; font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted)}
  .hero-desc{margin-top:20px; max-width:560px; font-size:15px; color:var(--muted); line-height:1.65}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 16px; border-radius:8px;
    background:rgba(22,22,22,.6); border:1px solid var(--border);
    color:var(--text); font-size:14px; font-weight:500; cursor:pointer;
    transition:all .3s ease;
  }
  .btn:hover{background:var(--card-2); transform:translateY(-2px) scale(1.02);
    box-shadow:0 0 0 1px var(--border-2), 0 0 24px rgba(255,255,255,.05)}
  .btn-sm{padding:6px 12px; font-size:12px; border-radius:6px}
  .btn-mt{margin-top:28px}
  .icon{width:16px; height:16px; stroke-width:2}

  .impact{max-width:768px; margin:0 auto; padding:0 20px 48px}
  .impact-card{
    max-width:320px; margin:0 auto;
    background:rgba(18,18,18,.6); border-radius:12px; padding:24px 32px;
    text-align:center;
    box-shadow:0 0 0 1px #383838, 0 0 24px rgba(255,255,255,.04);
    transition:all .3s ease;
  }
  .impact-card:hover{transform:translateY(-2px) scale(1.02)}
  .impact-num{font-size:36px; font-weight:600; letter-spacing:-.02em}
  .impact-label{margin-top:4px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.2em}

  .section{max-width:1024px; margin:0 auto; padding:48px 20px}
  .section-head{text-align:center; margin-bottom:32px}
  .section-head h2{font-size:28px; font-weight:600; letter-spacing:-.02em}
  .section-head p{margin-top:6px; font-size:14px; color:var(--muted)}

  .grid{
    max-width:768px; margin:0 auto;
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  }
  @media(max-width:640px){ .grid{grid-template-columns:repeat(2,1fr)} }
  .card{
    background:rgba(18,18,18,.6); border:1px solid var(--border);
    border-radius:12px; padding:12px;
    transition:all .3s ease;
  }
  .card:hover{transform:translateY(-4px) scale(1.015);
    box-shadow:0 0 0 1px #3d3d3d, 0 8px 32px rgba(0,0,0,.6), 0 0 24px rgba(255,255,255,.05)}
  .card-head{display:flex; align-items:flex-start; gap:12px}
  .card-img{
    width:48px; height:48px; border-radius:8px; overflow:hidden;
    border:1px solid var(--border); background:var(--card-2); flex-shrink:0;
  }
  .card-img img{width:100%; height:100%; object-fit:cover}
  .card-name{font-size:14px; font-weight:600; letter-spacing:-.01em; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap}
  .badge{
    display:inline-block; margin-left:6px; padding:2px 6px;
    font-size:9px; text-transform:uppercase; letter-spacing:.1em;
    border:1px solid var(--border); background:rgba(10,10,10,.8);
    color:var(--muted); border-radius:4px; vertical-align:middle;
  }
  .card-desc{
    margin-top:8px; font-size:12px; color:var(--muted); line-height:1.55;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .smaller{max-width:560px; margin:32px auto 0; text-align:center; font-size:14px; color:var(--muted)}

  .contact{max-width:768px; margin:0 auto; padding:64px 20px; text-align:center}
  .contact h2{font-size:28px; font-weight:600; letter-spacing:-.02em}
  .contact p{margin-top:8px; font-size:14px; color:var(--muted)}
  .contact .btn{margin-top:24px; padding:10px 18px}

  footer{
    border-top:1px solid rgba(38,38,38,.6);
    padding:24px; text-align:center; font-size:12px; color:var(--muted-2);
  }
</style>
</head>
<body>

<header>
  <nav>
    <button class="brand" data-scroll="hero">oSein</button>
    <div class="nav-actions">
      <button class="nav-link" data-scroll="servers" data-i18n="nav_servers">Servers</button>
      <button class="nav-link" data-scroll="contact" data-i18n="nav_contact">Contact</button>
      <div class="lang">
        <button data-lang="en" class="active">EN</button>
        <button data-lang="pt">PT-BR</button>
      </div>
    </div>
  </nav>
</header>

<section id="hero" class="hero">
  <div class="avatar-ring">
    <img src="https://i.pinimg.com/736x/93/c6/6e/93c66e735b6c02afb07c3ba23480dfd7.jpg" alt="oSein avatar">
  </div>
  <h1>oSein</h1>
  <p class="hero-sub" data-i18n="hero_subtitle">Discord Staff & Moderation</p>
  <p class="hero-desc" data-i18n="hero_description"></p>
  <button class="btn btn-mt" data-scroll="servers">
    <span data-i18n="hero_cta">View servers</span>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
  </button>
</section>

<section class="impact">
  <div class="impact-card">
    <div class="impact-num">30K+</div>
    <div class="impact-label" data-i18n="impact_label">Members Impacted</div>
  </div>
</section>

<section id="servers" class="section">
  <div class="section-head">
    <h2 data-i18n="servers_title">Servers</h2>
    <p data-i18n="servers_subtitle">Communities I currently work with.</p>
  </div>
  <div class="grid" id="serverGrid"></div>
  <p class="smaller" data-i18n="smaller_servers"></p>
</section>

<section id="contact" class="contact">
  <h2 data-i18n="contact_title">Contact</h2>
  <p data-i18n="contact_subtitle"></p>
  <a class="btn" href="https://discord.com/users/1077000858342006867" target="_blank" rel="noopener">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span data-i18n="contact_cta">Message on Discord</span>
  </a>
</section>

<footer>
  © <span id="year"></span> oSein · <span data-i18n="footer">Built with care.</span>
</footer>

<script>
const servers = [
  { name:"Anime Crash", image:"https://cdn.discordapp.com/attachments/1253521147962593320/1500566591299915826/image.png?ex=69f8e70a&is=69f7958a&hm=871cbdadfb108b16734444f25da5a4cd04fa80b38b72b7f19744c39f2398a880&", invite:"https://discord.gg/G9zCKpsrCw", inDev:false },
  { name:"Anime Brawl", image:"https://osein.vercel.app/assets/Anime%20Brawl.png", invite:"https://discord.gg/xCN3kvCwzG", inDev:true },
  { name:"Anime All", image:"https://osein.vercel.app/assets/AL.webp", invite:"https://discord.com/invite/CkVnGNm3Ct", inDev:false },
  { name:"Anime Paradise", image:"https://cdn.discordapp.com/attachments/1253521147962593320/1500286980708241592/image.png?ex=69f88b62&is=69f739e2&hm=1966adda5d074f8016abe3ccfa2668cf408b273ab5706907fbdcf87bb30e96b8&", invite:"https://discord.gg/P8J8DzcvK3", inDev:true },
  { name:"Anime Force", image:"https://cdn.discordapp.com/icons/1468750548311343227/ea1a5d311f7be5e271a610c89d8d0a0d.png", invite:"https://discord.gg/9vV9amACpG", inDev:true },
  { name:"Diamond's Destiny", image:"https://cdn.discordapp.com/attachments/1253521147962593320/1500556591211216956/image.png?ex=69f8ddba&is=69f78c3a&hm=a97bf09cd3542bbd3f487d13dbe6871d2c07fbe92444b1660d940056b93282df&", invite:"https://discord.gg/mURCTtR6m4", inDev:true },
];

const i18n = {
  en:{
    nav_servers:"Servers", nav_contact:"Contact",
    hero_subtitle:"Discord Staff & Moderation",
    hero_description:"Building safer, friendlier communities. I help anime servers grow with structure, fair moderation and care for every member.",
    hero_cta:"View servers",
    impact_label:"Members Impacted",
    servers_title:"Servers", servers_subtitle:"Communities I currently work with.",
    in_dev:"In Dev", join:"Join",
    smaller_servers:"I've also worked with smaller servers and communities with over 1,000 members.",
    contact_title:"Contact", contact_subtitle:"Open for staff opportunities and collaborations.",
    contact_cta:"Message on Discord", footer:"Built with care.",
    server_desc:{
      "Anime Crash":"Active anime hub for fans, art and events.",
      "Anime Brawl":"Competitive anime community in development.",
      "Anime All":"All-in-one anime space for discussion and media.",
      "Anime Paradise":"Cozy anime paradise being shaped right now.",
      "Anime Force":"Growing anime force currently in development.",
      "Diamond's Destiny":"New community in active development.",
    }
  },
  pt:{
    nav_servers:"Servidores", nav_contact:"Contato",
    hero_subtitle:"Staff e Moderação no Discord",
    hero_description:"Construindo comunidades mais seguras e acolhedoras. Ajudo servidores de anime a crescerem com estrutura, moderação justa e cuidado com cada membro.",
    hero_cta:"Ver servidores",
    impact_label:"Membros Impactados",
    servers_title:"Servidores", servers_subtitle:"Comunidades em que atuo atualmente.",
    in_dev:"Em Dev", join:"Entrar",
    smaller_servers:"Também trabalhei com servidores menores e comunidades com mais de 1.000 membros.",
    contact_title:"Contato", contact_subtitle:"Aberto para oportunidades de staff e colaborações.",
    contact_cta:"Mensagem no Discord", footer:"Feito com cuidado.",
    server_desc:{
      "Anime Crash":"Hub ativo de anime para fãs, arte e eventos.",
      "Anime Brawl":"Comunidade competitiva de anime em desenvolvimento.",
      "Anime All":"Espaço completo de anime para discussão e mídia.",
      "Anime Paradise":"Paraíso aconchegante de anime em construção.",
      "Anime Force":"Força crescente de anime em desenvolvimento.",
      "Diamond's Destiny":"Nova comunidade em desenvolvimento ativo.",
    }
  }
};

let lang = "en";

function renderServers(){
  const t = i18n[lang];
  document.getElementById("serverGrid").innerHTML = servers.map(s => `
    <article class="card">
      <div class="card-head">
        <div class="card-img"><img src="${s.image}" alt="${s.name}" loading="lazy"></div>
        <div style="min-width:0;flex:1">
          <div class="card-name">${s.name}${s.inDev ? `<span class="badge">${t.in_dev}</span>` : ""}</div>
        </div>
      </div>
      <p class="card-desc">${t.server_desc[s.name] || ""}</p>
      <a class="btn btn-sm" style="margin-top:12px" href="${s.invite}" target="_blank" rel="noopener">
        ${t.join}
        <svg class="icon" style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 17L17 7M7 7h10v10"/></svg>
      </a>
    </article>
  `).join("");
}

function applyLang(){
  const t = i18n[lang];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(t[k] !== undefined) el.textContent = t[k];
  });
  document.querySelectorAll(".lang button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  renderServers();
}

document.querySelectorAll(".lang button").forEach(b=>{
  b.addEventListener("click", ()=>{ lang = b.dataset.lang; applyLang(); });
});
document.querySelectorAll("[data-scroll]").forEach(el=>{
  el.addEventListener("click", ()=>{
    document.getElementById(el.dataset.scroll)?.scrollIntoView({behavior:"smooth"});
  });
});
document.getElementById("year").textContent = new Date().getFullYear();
applyLang();
</script>
</body>
</html>
